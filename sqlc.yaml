version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/"
    schema: "sql/migrations/"
    gen:
      go:
        package: "db"
        sql_package: "pgx/v5"
        out: "internal/database/"
        emit_json_tags: true
        emit_prepared_queries: true
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"